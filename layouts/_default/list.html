{{ define "main" }}
<div style="max-width: 1200px; margin: 0 auto; padding: 60px 24px;">
  <h1 style="font-size: 2rem; font-weight: 800; text-align: center; margin-bottom: 8px;">{{ .Title }}</h1>
  <p style="color: #64748b; text-align: center; margin-bottom: 48px;">{{ with .Description }}{{ . }}{{ end }}</p>
  
  <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 24px;">
    {{ range .Pages }}
    <article style="background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 28px; transition: all 0.3s ease;">
      <div style="display: flex; gap: 12px; margin-bottom: 12px; font-size: 0.8rem;">
        <span style="color: #64748b;">{{ .Date.Format "02 Jan 2006" }}</span>
        {{ with .Params.categories }}
        <span style="background: #1a5632; color: white; padding: 2px 10px; border-radius: 20px; font-size: 0.75rem;">{{ index . 0 }}</span>
        {{ end }}
      </div>
      <h3 style="font-size: 1.1rem; font-weight: 700; margin-bottom: 8px;">
        <a href="{{ .Permalink }}" style="text-decoration: none; color: #1a1a2e;">{{ .Title }}</a>
      </h3>
      <p style="font-size: 0.9rem; color: #64748b; margin-bottom: 16px;">{{ .Description | truncate 120 }}</p>
      <a href="{{ .Permalink }}" style="font-size: 0.85rem; color: #1a5632; font-weight: 600; text-decoration: none;">पूरा पढ़ें →</a>
    </article>
    {{ end }}
  </div>
</div>
{{ end }}
