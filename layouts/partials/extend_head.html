<!-- Custom CSS -->
<link rel="stylesheet" href="/css/custom.css">

<!-- Schema Markup for Articles -->
{{ if .IsPage }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": "{{ .Title }}",
  "description": "{{ .Description }}",
  "datePublished": "{{ .Date.Format "2006-01-02" }}",
  "dateModified": "{{ .Lastmod.Format "2006-01-02" }}",
  "author": {
    "@type": "Organization",
    "name": "CaneUp"
  },
  "publisher": {
    "@type": "Organization",
    "name": "CaneUp",
    "logo": {
      "@type": "ImageObject",
      "url": "https://caneup.xyz/logo.png"
    }
  }
}
</script>
{{ end }}

<!-- Schema Markup for Website -->
{{ if .IsHome }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "CaneUp",
  "url": "https://caneup.xyz",
  "description": "गन्ना किसानों का सम्पूर्ण गाइड - पर्ची कैलेंडर, MSP रेट, खेती के टिप्स, सरकारी योजनाएं",
  "potentialAction": {
    "@type": "SearchAction",
    "target": "https://caneup.xyz/search?q={search_term_string}",
    "query-input": "required name=search_term_string"
  }
}
</script>
{{ end }}

<!-- FAQ Schema -->
{{ if .Params.faq }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {{ range $i, $q := .Params.faq }}
    {{ if $i }},{{ end }}
    {
      "@type": "Question",
      "name": "{{ $q.question }}",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "{{ $q.answer }}"
      }
    }
    {{ end }}
  ]
}
</script>
{{ end }}
